<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Inventory & Recipe Calculator</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Inventory & Recipe Calculator</h1>

<div class="container">

	<!-- Inventory Section -->
	<div class="section">
		<h2>Inventory</h2>
		<input id="itemName" placeholder="Item name">
		<input id="itemQty" placeholder="Quantity" type="number">
		<input id="itemCost" placeholder="Cost per unit" type="number" step="0.01">
		<button onclick="addItem()">Add Item</button>

		<div id="inventory" class="list"></div>
	</div>

	<!-- Recipe Section -->
	<div class="section">
		<h2>Recipe Calculator</h2>
		<select id="recipeItem">
			<option value="">Select an item</option>
		</select>
		<input id="recipeQty" placeholder="Amount used" type="number">
		<button onclick="addToRecipe()">Add Ingredient</button>

		<div id="recipe" class="list"></div>

		<h3 id="totalCost">Total: $0.00</h3>
	</div>

</div>

<script src="script.js"></script>
</body>
</html>
